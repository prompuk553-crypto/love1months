<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 1 Months Anniversary</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(135deg, #ffdde1 0%, #ee9ca7 100%);
            font-family: 'Prompt', sans-serif; overflow: hidden; text-align: center; color: #4a4a4a;
        }

        /* ล็อคความสูงเพื่อให้จอนิ่ง ไม่สั่น */
        .pages-container { 
            position: relative; width: 95%; max-width: 450px; min-height: 650px; 
            z-index: 10; display: flex; align-items: center; justify-content: center;
        }

        .page {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            padding: 25px 15px; border-radius: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: opacity 0.4s ease; opacity: 0; display: none; border: 2px solid #ffffff; width: 100%;
        }
        
        .page.active { display: block; opacity: 1; }

        /* จัดเรียง 6 รูป (แถวละ 3 รูป) - แก้รูปที่ 5 ให้เท่าเพื่อนแล้ว */
        .photo-grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; width: 100%; }
        .photo-item { display: flex; flex-direction: column; align-items: center; }
        .photo-frame-small { width: 100%; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden; border: 3px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .photo-frame-small img { width: 100%; height: 100%; display: block; object-fit: cover; }
        .photo-caption { font-size: 10px; color: #ff758f; margin-top: 5px; font-weight: bold; line-height: 1.3; height: 45px; overflow: hidden; }

        .message-form { margin-top: 15px; text-align: left; width: 100%; }
        .message-form textarea {
            width: 100%; height: 90px; padding: 12px; border-radius: 20px;
            border: 2px solid #ffdde1; font-family: 'Prompt', sans-serif; resize: none; outline: none; font-size: 14px;
        }
        .btn-send { width: 100%; background: #ff4d6d; color: white; border: none; padding: 12px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .main-photo-frame { width: 100%; border-radius: 20px; overflow: hidden; border: 5px solid #fff; margin-bottom: 10px; }
        .btn-love { background: #ff4d6d; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .heart-box { background: #fff0f3; padding: 15px; border-radius: 20px; color: #ff4d6d; font-weight: bold; line-height: 1.6; font-size: 13px; max-height: 200px; overflow-y: auto; text-align: left; }
        .music-btn-container { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
        #musicBtn { background: rgba(255,255,255,0.8); border: none; padding: 12px; border-radius: 50%; cursor: pointer; font-size: 22px; }
        .bg-heart { position: absolute; color: rgba(255, 255, 255, 0.5); animation: float 5s infinite linear; top: -10%; z-index: 1; }
        @keyframes float { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(110vh) rotate(360deg); } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="pages-container">
        <div class="page active" id="page1">
            <h1 style="font-size: 50px; color: #ff4d6d;">1</h1>
            <p style="color: #ff758f; letter-spacing: 2px; margin-bottom: 15px;">MONTHS</p>
            <p style="font-size: 14px;">ข้อความ</p>
            <button class="btn-love" onclick="showPage(2)">ไปดูความทรงจำกันนน 🧸</button>
        </div>

        <div class="page" id="page2">
            <h2 style="color:#ff4d6d; margin-bottom:5px; font-size: 18px;">Our Memories</h2>
            <div class="photo-grid-6">
                <div class="photo-item">
                    <div class="photo-frame-small"><img src="ลิงค์ภาพ"></div>
                    <div class="photo-caption">ข้อความ</div>
                </div>
                <div class="photo-item">
                    <div class="photo-frame-small"><img src="ลิงค์ภาพ"></div>
                    <div class="photo-caption">ข้อความ</div>
                </div>
                <div class="photo-item">
                    <div class="photo-frame-small"><img src="ลิงค์ภาพ"></div>
                    <div class="photo-caption">ข้อความ</div>
                </div>
                <div class="photo-item">
                    <div class="photo-frame-small"><img src="ลิงค์ภาพ"></div>
                    <div class="photo-caption">ข้อความ</div>
                </div>
                <div class="photo-item">
                    <div class="photo-frame-small"><img src="ลิงค์ภาพ"></div>
                    <div class="photo-caption">ข้อความ</div>
                </div>
                <div class="photo-item">
                    <div class="photo-frame-small"><img src="ลิงค์ภาพ"></div>
                    <div class="photo-caption">ข้อความ</div>
                </div>
            </div>
            <button class="btn-love" onclick="showPage(3)">มีความในใจจะบอก... 💌</button>
        </div>

        <div class="page" id="page3">
            <h2 style="color:#ff4d6d; margin-bottom:10px; font-size: 18px;">To My Love</h2>
            <div class="main-photo-frame"><img src="ลิงค์ภาพ" style="width:100%;"></div>
            <div class="heart-box">
                ข้อความ
            </div>
            <button class="btn-love" onclick="showPage(4)">ส่งข้อความหาเค้า ✉️</button>
        </div>

        <div class="page" id="page4">
            <h2 style="color:#ff4d6d; font-size: 20px;">Write to Me</h2>
            <div class="message-form">
                <form action="https://formspree.io/f/xreokela" method="POST">
                    <textarea name="message" placeholder="ที่รักอยากบอกอะไรเค้าไหม..."></textarea>
                    <button type="submit" class="btn-send">ส่งจดหมายรัก ❤️</button>
                </form>
            </div>
            <button style="margin-top:15px; border:none; background:none; color:#ff758f; cursor:pointer; font-weight:bold; font-size:12px;" onclick="showPage(1)">🏠 กลับไปหน้าแรกสุด</button>
        </div>
    </div>

    <audio id="myAudio" loop><source src="ลิ้งค์เพลง" type="audio/mpeg"></audio>
    <div class="music-btn-container"><button onclick="togglePlay()" id="musicBtn">🔇</button></div>

    <script>
        function showPage(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + num).classList.add('active');
        }
        var audio = document.getElementById("myAudio");
        var btn = document.getElementById("musicBtn");
        function togglePlay() {
            if (audio.paused) { audio.play(); btn.innerHTML = "🔊"; } 
            else { audio.pause(); btn.innerHTML = "🔇"; }
        }
        document.body.addEventListener('click', function() {
            if (audio.paused) { audio.play(); btn.innerHTML = "🔊"; }
        }, { once: true });
        function createHeart() {
            const h = document.createElement('div'); h.classList.add('bg-heart'); h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw'; h.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(h); setTimeout(() => h.remove(), 5000);
        }
        setInterval(createHeart, 400);
    </script>
</body>
</html>
